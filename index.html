<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAA Student Journey Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F2EE;--surface:#FFF;--surface2:#EDEBE6;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1C1B18;--text2:#6B6960;--text3:#A8A59C;
  --purple:#5B4FD9;--purple-bg:#EEEDFB;--purple-dk:#3D33B0;
  --teal:#0D7A60;--teal-bg:#E0F4EE;--teal-dk:#075441;
  --amber:#8A5200;--amber-bg:#FEF3DC;--amber-dk:#5C3500;
  --red:#B02828;--red-bg:#FCEAEA;--red-dk:#7A1A1A;
  --green:#2E6B12;--green-bg:#EAF5E1;--green-dk:#1E4A0C;
  --blue:#1A5FA8;--blue-bg:#E5F0FB;--blue-dk:#0D3E73;
  --gray-bg:#EEECEA;--gray-dk:#4A4840;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}

/* Topbar */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border-md);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:50;height:52px;}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.logo-sub{font-size:11px;color:var(--text3);}

/* Tab nav */
.tab-nav{display:flex;gap:2px;margin-left:20px;}
.tab-btn{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid transparent;border-radius:8px;background:transparent;color:var(--text2);font-family:inherit;transition:all .12s;}
.tab-btn:hover{background:var(--surface2);}
.tab-btn.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-dk);font-weight:600;}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.last-upd{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.icon-btn{font-size:11px;color:var(--text2);background:var(--surface2);border:0.5px solid var(--border-md);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
.icon-btn:hover{background:var(--border);}

/* Layout */
.app-body{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 52px);overflow:hidden;}
.sidebar{background:var(--surface);border-right:0.5px solid var(--border-md);padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.main{overflow-y:auto;padding:18px 22px;}

/* Sidebar */
.f-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.f-input{width:100%;padding:7px 9px;border:0.5px solid var(--border-md);border-radius:9px;background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;}
.f-input:focus{outline:2px solid var(--purple);outline-offset:-1px;}
.f-chips{display:flex;flex-direction:column;gap:3px;}
.chip{padding:5px 9px;border-radius:7px;font-size:11px;cursor:pointer;background:var(--surface2);border:0.5px solid transparent;color:var(--text2);display:flex;justify-content:space-between;align-items:center;transition:all .1s;}
.chip:hover{border-color:var(--border-md);}
.chip.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-dk);font-weight:500;}
.chip-n{font-size:10px;font-family:'DM Mono',monospace;}
.divider{height:0.5px;background:var(--border);margin:3px 0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat-card{background:var(--surface2);border-radius:9px;padding:9px;}
.stat-v{font-size:18px;font-weight:600;line-height:1;margin-bottom:1px;}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
.kpi{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;padding:12px 14px;}
.kpi-l{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.kpi-v{font-size:26px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.kpi-s{font-size:10px;color:var(--text2);margin-top:3px;}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;background:var(--purple);transition:width .5s;}

/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.chart-card{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;padding:14px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.bar-lbl{font-size:10px;color:var(--text2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-bg{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.bar-val{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);min-width:28px;text-align:right;}

/* Line chart */
.line-chart-wrap{overflow-x:auto;}
.line-chart-wrap svg{min-width:320px;}

/* Table */
.tcard{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;overflow:hidden;}
.thead-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);}
.ttitle{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.tcnt{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.twrap{overflow-x:auto;max-height:calc(100vh - 400px);overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);text-align:left;padding:7px 11px;border-bottom:0.5px solid var(--border-md);position:sticky;top:0;background:var(--surface);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:8px 11px;border-bottom:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);cursor:pointer;}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;}
.t1{background:var(--green-bg);color:var(--green-dk);}
.t2{background:var(--blue-bg);color:var(--blue-dk);}
.t3{background:var(--amber-bg);color:var(--amber-dk);}
.t4,.t5{background:var(--red-bg);color:var(--red-dk);}
.nps-p{background:var(--green-bg);color:var(--green-dk);}
.nps-a{background:var(--amber-bg);color:var(--amber-dk);}
.nps-d{background:var(--red-bg);color:var(--red-dk);}
.jo-y{background:var(--teal-bg);color:var(--teal-dk);}
.jo-n{background:var(--gray-bg);color:var(--gray-dk);}
.pct-bar{display:flex;align-items:center;gap:5px;}
.pbar-bg{width:44px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;background:var(--purple);}

/* Detail panel */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;}
.detail-panel{width:440px;height:100vh;background:var(--surface);overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;border-left:0.5px solid var(--border-md);}
.dp-close{width:26px;height:26px;background:var(--surface2);border:none;border-radius:7px;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.dp-name{font-size:16px;font-weight:600;}
.dp-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.dp-kpi{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.dp-kc{background:var(--surface2);border-radius:9px;padding:9px 11px;}
.dp-kl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.dp-kv{font-size:18px;font-weight:600;line-height:1.2;}
.dp-sec{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.sc-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.sc-key{font-size:10px;color:var(--text2);width:80px;}
.sc-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.sc-fill{height:100%;border-radius:2px;background:var(--purple);}
.sc-num{font-size:10px;font-weight:600;min-width:28px;text-align:right;font-family:'DM Mono',monospace;}
.logbook-item{background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:11px;margin-bottom:5px;}
.logbook-sesi{font-weight:500;margin-bottom:2px;}
.logbook-meta{font-size:10px;color:var(--text3);}

/* Empty & loading */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.loading-bar{width:100%;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:20px;}
.loading-bar-fill{height:100%;background:var(--purple);border-radius:1px;animation:ld 1.5s ease-in-out infinite;}
@keyframes ld{0%{width:0%;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0%;margin-left:100%}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px;}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    WAA Student Journey
    <span class="logo-sub">Work Abroad Academy</span>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('regional')">Regional</button>
    <button class="tab-btn" onclick="switchTab('batch')">Batch</button>
    <button class="tab-btn" onclick="switchTab('student')">Student</button>
  </nav>
  <div class="topbar-right">
    <span class="last-upd" id="lastUpd">—</span>
    <button class="icon-btn" onclick="reloadAll()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Refresh
    </button>
  </div>
</header>

<div class="app-body">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <!-- populated by JS per tab -->
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div class="empty">Memuat data...</div>
  </main>
</div>

<!-- Detail panel (student) -->
<div class="detail-overlay" id="detailOverlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
// ── URLs ─────────────────────────────────────────────────────────────────────
const URLS = {
  regional: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRi-jQsaof8eDBAktqMwPHBTnLWa6k6dclPGxJqXadwEcIQCa-kdtSPzYS_AWM3JFgT1zVDLwEFemsg/pub?output=csv',
  batch:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIrmvLW6-YDuCiZ4yjc3_JAKhjdmSJDGKho1h87sceCPmTpsK-_i9guzRp74SVjoRL5mE_htpHVEpn/pub?output=csv',
  student:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQM5Tf6IhPba3Bcr4rlDWFkZ_CixyF7i41bpDupnP5P3tLdkgiNr8ntBN8aXGhy_BXnWsQOO3FjxRp-/pub?output=csv'
};

const PROXIES = [u => u, u => 'https://corsproxy.io/?'+encodeURIComponent(u), u => 'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];

// ── State ─────────────────────────────────────────────────────────────────────
let DATA = { regional: [], batch: [], student: [] };
let activeTab = 'regional';
let filters = { regional: {program:'', regional:'', tier:'', search:''}, batch: {program:'', regional:'', tier:'', search:''}, student: {program:'', batch:'', tier:'', jo:'', search:''} };
let sortState = { col: null, asc: true };

// ── Boot ──────────────────────────────────────────────────────────────────────
window.onload = reloadAll;

async function reloadAll() {
  setMain('<div class="loading-bar"><div class="loading-bar-fill"></div></div><div class="empty">Memuat data...</div>');
  const keys = ['regional','batch','student'];
  await Promise.all(keys.map(k => loadSheet(k)));
  document.getElementById('lastUpd').textContent = 'Update ' + new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  renderTab();
}

async function loadSheet(key) {
  const url = URLS[key];
  let csv = null;
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(url));
      if (!r.ok) continue;
      const t = await r.text();
      if (t && t.length > 10) { csv = t; break; }
    } catch(e) {}
  }
  if (csv) DATA[key] = parseCSV(csv);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += ch;
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h,i) => { const v=(vals[i]||'').replace(/^"|"$/g,'').trim(); obj[h]=v||null; });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  sortState = { col: null, asc: true };
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['regional','batch','student'][i] === tab);
  });
  renderTab();
}

function renderTab() {
  if (activeTab === 'regional') renderRegional();
  else if (activeTab === 'batch') renderBatch();
  else renderStudent();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function n(v, def=0) { const x=parseFloat(v); return isNaN(x)?def:x; }
function pct(v) { return n(v)>0 ? n(v).toFixed(1)+'%' : '—'; }
function sc(v) { return n(v)>0 ? n(v).toFixed(1) : '—'; }

function tierBadge(t) {
  if (!t) return '<span class="badge" style="background:var(--gray-bg);color:var(--gray-dk)">—</span>';
  const raw = t.replace(/^\d\s*-\s*/,'');
  const cls = raw.includes('Excellent')?'t1':raw.includes('Good')?'t2':raw.includes('Need')?'t3':raw.includes('Risk')?'t4':'t5';
  return `<span class="badge ${cls}">${raw}</span>`;
}
function npsBadge(s) {
  if (!s) return '—';
  const cls = s==='Promoter'?'nps-p':s==='Passive'?'nps-a':'nps-d';
  return `<span class="badge ${cls}">${s}</span>`;
}
function joBadge(f) {
  return f==='Dapat JO' ? '<span class="badge jo-y">Dapat JO</span>' : '<span class="badge jo-n">Belum JO</span>';
}
function pctBar(v, color='var(--purple)') {
  const val = Math.min(n(v), 100);
  return `<div class="pct-bar"><div class="pbar-bg"><div class="pbar-fill" style="width:${val}%;background:${color}"></div></div><span style="font-family:'DM Mono',monospace;font-size:10px">${val>0?val.toFixed(1)+'%':'—'}</span></div>`;
}
function barChart(items, color='var(--purple)') {
  const max = Math.max(...items.map(i=>i.v),1);
  return items.map(i=>`<div class="bar-row">
    <span class="bar-lbl" title="${i.l}">${i.l}</span>
    <div class="bar-bg"><div class="bar-fill" style="width:${(i.v/max*100).toFixed(1)}%;background:${color}"></div></div>
    <span class="bar-val">${typeof i.v==='number'?i.v.toFixed(typeof i.fmt==='string'?1:0):i.v}</span>
  </div>`).join('');
}
function avg(arr, key) {
  const vs = arr.map(r=>n(r[key])).filter(v=>v>0);
  return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : 0;
}
function setMain(html) { document.getElementById('mainContent').innerHTML = html; }
function setSidebar(html) { document.getElementById('sidebar').innerHTML = html; }

function buildSidebarFilters(opts, fkey) {
  const f = filters[fkey];
  let html = '';
  if (opts.search !== false) html += `<div><div class="f-label">Cari</div><input class="f-input" value="${f.search||''}" placeholder="Ketik untuk cari..." oninput="filters['${fkey}'].search=this.value;renderTab()"></div>`;
  if (opts.program) {
    const progs = [...new Set(DATA[fkey].map(r=>r.program).filter(Boolean))].sort();
    html += `<div><div class="f-label">Program</div><select class="f-input" onchange="filters['${fkey}'].program=this.value;renderTab()">
      <option value="">Semua program</option>${progs.map(p=>`<option value="${p}" ${f.program===p?'selected':''}>${p}</option>`).join('')}
    </select></div>`;
  }
  if (opts.regional) {
    const regs = [...new Set(DATA[fkey].map(r=>r.regional).filter(Boolean))].sort();
    html += `<div><div class="f-label">Regional</div><select class="f-input" onchange="filters['${fkey}'].regional=this.value;renderTab()">
      <option value="">Semua regional</option>${regs.map(p=>`<option value="${p}" ${f.regional===p?'selected':''}>${p}</option>`).join('')}
    </select></div>`;
  }
  if (opts.batch) {
    const batches = [...new Set(DATA[fkey].map(r=>r.batch).filter(Boolean))].sort();
    html += `<div><div class="f-label">Batch</div><select class="f-input" onchange="filters['${fkey}'].batch=this.value;renderTab()">
      <option value="">Semua batch</option>${batches.map(p=>`<option value="${p}" ${f.batch===p?'selected':''}>${p}</option>`).join('')}
    </select></div>`;
  }
  if (opts.tier) {
    const tiers = ['1 - Excellent','2 - Good','3 - Need Improvement','4 - At-Risk','5 - Critical'];
    html += `<div class="divider"></div><div><div class="f-label">Tier</div><div class="f-chips">
      <div class="chip ${!f.tier?'active':''}" onclick="filters['${fkey}'].tier='';renderTab()">Semua</div>
      ${tiers.map(t=>`<div class="chip ${f.tier===t?'active':''}" onclick="filters['${fkey}'].tier='${t}';renderTab()">${t.replace(/^\d - /,'')}</div>`).join('')}
    </div></div>`;
  }
  if (opts.jo) {
    html += `<div class="divider"></div><div><div class="f-label">Status JO</div><div class="f-chips">
      <div class="chip ${!f.jo?'active':''}" onclick="filters['${fkey}'].jo='';renderTab()">Semua</div>
      <div class="chip ${f.jo==='Dapat JO'?'active':''}" onclick="filters['${fkey}'].jo='Dapat JO';renderTab()">Dapat JO</div>
      <div class="chip ${f.jo==='Belum JO'?'active':''}" onclick="filters['${fkey}'].jo='Belum JO';renderTab()">Belum JO</div>
    </div></div>`;
  }
  return html;
}

// ── [1] REGIONAL ─────────────────────────────────────────────────────────────
function renderRegional() {
  const f = filters.regional;
  let data = DATA.regional.filter(r => {
    if (f.search && !(r.regional||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    if (f.program && r.program !== f.program) return false;
    if (f.regional && r.regional !== f.regional) return false;
    if (f.tier && (r.tier_regional||r.tier) !== f.tier) return false;
    return true;
  });

  setSidebar(buildSidebarFilters({search:true, program:true, regional:true, tier:true}, 'regional'));

  if (!data.length) { setMain('<div class="empty">Tidak ada data regional.</div>'); return; }

  // KPI
  const totStudent = data.reduce((s,r)=>s+n(r.total_student),0);
  const totBatch = data.reduce((s,r)=>s+n(r.total_batch),0);
  const avgHadir = avg(data,'avg_kehadiran');
  const avgNilai = avg(data,'avg_nilai_akumulasi');
  const totJO = data.reduce((s,r)=>s+n(r.total_dapat_jo),0);

  const kpi = `<div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total Student</div><div class="kpi-v">${totStudent.toLocaleString('id')}</div><div class="kpi-s">${data.length} regional aktif</div></div>
    <div class="kpi"><div class="kpi-l">Total Batch</div><div class="kpi-v">${totBatch.toLocaleString('id')}</div><div class="kpi-s">Batch berjalan</div></div>

    <div class="chart-card"><div class="chart-title">Distribusi Tier</div>${barChart([

      ${scoreRows([['Mid N5','avg_mid_n5'],['Final N5','avg_final_n5'],['Mid N4','avg_mid_n4'],['Final N4','avg_final_n4']])}`:
    '<div style="font-size:11px;color:var(--text3);text-align:center;padding:10px">Data nilai belum tersedia</div>'}
    ${logbooks.length?`<div class="dp-sec" style="margin-top:6px">Logbook Aktivitas (${r.total_sesi_diikuti||0} sesi)</div>
    ${logbooks.slice(0,10).map(s=>`<div class="logbook-item"><div class="logbook-sesi">${s}</div></div>`).join('')}
    ${logbooks.length>10?`<div style="font-size:10px;color:var(--text3);text-align:center">+${logbooks.length-10} sesi lainnya</div>`:''}`:
    '<div style="font-size:11px;color:var(--text3);text-align:center;padding:10px">Belum ada data logbook</div>'}`;

  document.getElementById('detailOverlay').style.display = 'flex';
}

function closeDetail() { document.getElementById('detailOverlay').style.display = 'none'; }
</script>
</body>
</html>
